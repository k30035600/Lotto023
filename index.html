<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 자동 생성기 (V2.1)</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 기본 UI 구조 -->
    <header class="page-header">
        <div class="header-content">
            <h1>로또 번호 자동 생성기 (V2.1)</h1>
            <nav class="header-nav" aria-label="주 메뉴"></nav>
        </div>
    </header>

    <main class="page-body">
        <div class="main-container">
            <!-- 좌측 패널 (통계공) -->
            <div class="panel-box panel-box-stats">
                <div id="statsPanel" class="stats-panel left-panel">
                    <h2>
                        <span>통계공</span>
                        <div id="aiChatButton" class="ai-chat-button" title="AI 로또 분석">🤖 AI 분석</div>
                    </h2>
                    <div id="dateRangeBox" class="stats-box">
                        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                            <div style="display: flex; flex-direction: column; gap: 5px;">
                                <div style="display: flex; align-items: center; gap: 4px;">
                                    <input type="radio" id="rangeTypeRound" name="rangeType" value="round" checked>
                                    <label for="rangeTypeRound"
                                        style="font-size: 0.9rem; white-space: nowrap;">조회회차:</label>
                                    <input type="number" id="startRound" class="range-input" placeholder="시작" min="1"
                                        max="9999">
                                    <span id="startRoundDate" style="font-size:0.8rem; color:#666;"></span>
                                    <span class="range-tilde">~</span>
                                    <input type="number" id="endRound" class="range-input" placeholder="종료" min="1"
                                        max="9999">
                                    <span id="endRoundDate" style="font-size:0.8rem; color:#666;"></span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 4px;">
                                    <input type="radio" id="rangeTypeDate" name="rangeType" value="date">
                                    <label for="rangeTypeDate"
                                        style="font-size: 0.9rem; white-space: nowrap;">조회기간:</label>
                                    <input type="text" id="startDate" class="range-input" placeholder="yy/mm/dd"
                                        maxlength="8">
                                    <span class="range-tilde">~</span>
                                    <input type="text" id="endDate" class="range-input" placeholder="yy/mm/dd"
                                        maxlength="8">
                                </div>
                            </div>
                            <button id="selectDateRangeBtn" class="filter-btn" style="align-self: center;">조회</button>
                        </div>
                    </div>
                    <div class="stats-sort">
                        <button id="sortNumber" class="sort-btn active">번호순▲</button>
                        <button id="sortWin" class="sort-btn">당첨순▼</button>
                        <button id="sortAppearance" class="sort-btn">출현순▼</button>
                        <select id="seqFilter" class="sort-btn seq-filter-select">
                            <option value="none">연속없음</option>
                            <option value="1">연속 1회</option>
                            <option value="2">연속 2회</option>
                            <option value="3">연속 3회</option>
                        </select>
                    </div>
                    <div id="statsList" class="stats-list">
                        <p>통계공/당첨공 로딩중</p>
                    </div>
                </div>
            </div>

            <!-- 중앙 패널 (선택공/게임공/저장공) -->
            <div class="panel-box panel-box-game">
                <div class="game-panel center-panel">
                    <!-- 선택공 그리드 영역 (JS에서 stats-box로 감싸 동적 생성) -->

                    <!-- 선택공 -->
                    <div id="filterBox" class="stats-box">
                        <div class="filter-container">
                            <select id="oddEvenFilter">
                                <option value="none">홀짝없음</option>
                                <option value="0-6">홀짝0:6</option>
                                <option value="1-5">홀짝1:5</option>
                                <option value="2-4">홀짝2:4</option>
                                <option value="3-3">홀짝3:3</option>
                                <option value="4-2">홀짝4:2</option>
                                <option value="5-1">홀짝5:1</option>
                                <option value="6-0">홀짝6:0</option>
                            </select>
                            <select id="sequenceFilter">
                                <option value="none">연속없음</option>
                                <option value="1">연속1회</option>
                                <option value="2">연속2회</option>
                                <option value="3">연속3회</option>
                            </select>
                            <select id="hotColdFilter">
                                <option value="none">핫콜없음</option>
                                <option value="0-6">핫콜0:6</option>
                                <option value="1-5">핫콜1:5</option>
                                <option value="2-4">핫콜2:4</option>
                                <option value="3-3">핫콜3:3</option>
                                <option value="4-2">핫콜4:2</option>
                                <option value="5-1">핫콜5:1</option>
                                <option value="6-0">핫콜6:0</option>
                            </select>
                            <div class="sum-range-box">
                                <input type="number" id="sumRangeStart" placeholder="시작" min="21" max="255"
                                    title="6개 번호 합 최소(21~255)" style="width:36px;text-align:center;" />
                                <span style="margin:0;">~</span>
                                <input type="number" id="sumRangeEnd" placeholder="종료" min="21" max="255"
                                    title="6개 번호 합 최대(21~255)" style="width:36px;text-align:center;" />
                            </div>
                        </div>
                    </div>

                    <!-- 게임공 -->
                    <div id="gameBox" class="stats-box">
                        <h2 style="display: flex; align-items: center; gap: 10px; width: 100%;">
                            <span>게임공</span>
                            <div style="display: flex; gap: 8px; margin-left: auto;">
                                <button id="goldenAiBtnHeader" onclick="generateGoldenAiGames()" title="황금조합 생성">🤖 AI
                                    황금조합</button>
                            </div>
                        </h2>
                        <div id="gameSetsContainer">
                            <!-- 1~5게임이 여기에 동적으로 생성됩니다 -->
                        </div>
                    </div>

                    <!-- 프리미엄 AI 분석 박스 (신규 추가) -->
                    <div id="premiumAiBox" class="stats-box"
                        style="display: none; border: 2px dashed #FFD700; background: #ffffff; padding: 15px;">
                        <h2
                            style="font-size: 1.1rem; color: #D4961A; border-bottom: 2px solid #FBBC05; padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                            🏆 AI PREMIUM LUCKY TICKET
                            <span style="font-size: 0.8rem; cursor: pointer; color: #999;"
                                onclick="togglePremiumAiBox()">닫기 ×</span>
                        </h2>

                        <div id="premiumTicketArea" style="text-align: center; margin-bottom: 15px;">
                            <!-- 캔버스는 숨기고 이미지만 보여줄 수도 있지만, 일단 캔버스를 보이게 배치 -->
                            <canvas id="premiumTicketCanvas" width="400" height="280"
                                style="max-width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);"></canvas>
                        </div>

                        <div id="premiumAnalysis"
                            style="background: #fff; padding: 12px; border-radius: 8px; font-size: 0.85rem; line-height: 1.6; border: 1px solid #eee; margin-bottom: 15px; color: #333;">
                            <!-- AI 분석 텍스트가 여기에 표시됩니다 -->
                        </div>

                        <div style="display: flex; gap: 8px;">
                            <button id="copySnsBtn"
                                style="flex: 1; padding: 10px; border-radius: 20px; border: none; background: #FFD700; color: #000; font-weight: bold; cursor: pointer;">
                                메시지 코드로 복사 📤
                            </button>
                            <button id="downloadTicketBtn"
                                style="flex: 1; padding: 10px; border-radius: 20px; border: none; background: #34A853; color: #fff; font-weight: bold; cursor: pointer;">
                                티켓 저장/카톡전송 💾
                            </button>
                        </div>
                    </div>

                    <!-- 저장공 (원위치 복구) -->
                    <div id="saveBox" class="stats-box">
                        <div class="save-container">
                            <input type="number" id="saveRound" placeholder="회차" disabled />
                            <button id="saveBtn" class="sort-btn" disabled>저장</button>
                        </div>
                    </div>

                    <!-- 저장공 (결과) -->
                    <div id="resultBox" class="stats-box">
                        <div style="display: flex; align-items: center; margin-bottom: 10px;">
                            <h2 style="margin: 0; min-width: 60px;">저장공</h2>
                            <div id="resultSummary"
                                style="font-size: 0.85rem; color: #333; text-align: center; flex: 1; padding: 0 10px; font-weight: 500;">
                            </div>
                            <div style="text-align: right; min-width: 60px;">
                                <button id="deleteSelectedBtn" disabled
                                    style="background: none; border: 1px solid #ccc; color: #ccc; border-radius: 4px; padding: 2px 8px; cursor: default; font-size: 0.75rem; transition: all 0.2s;">선택삭제</button>
                            </div>
                        </div>
                        <div id="resultContainer">
                            <p class="result-placeholder">저장된 결과가 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 우측 패널 (당첨공) -->
            <div class="panel-box panel-box-win">
                <div id="viewNumbersPanel" class="stats-panel right-panel">
                    <div class="view-numbers-header">
                        <h2 id="roundNumbersTitle" class="view-numbers-title-left">당첨공</h2>
                        <span id="statsHeaderDisplay" class="view-numbers-stats-center">[ 0000회, 전체 평균: 000 ]</span>
                    </div>
                    <div id="viewNumbersList" class="stats-list view-numbers-inline">
                        <p>통계공/당첨공 로딩중</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 컨테이너 (하나의 통합된 패널) - 푸터 위로 이동 및 기본 숨김 -->
        <div id="bottomArea" class="bottom-container" style="display: none;">
            <div id="bottomDragHandle" class="bottom-drag-handle" title="상하 드래그하여 위치 이동"></div>
            <div class="stats-panel unified-bottom-panel" style="padding: 0;">
                <div id="bottomUnifiedContent"
                    style="border: none; padding: 0; height: 100%; overflow-x: auto; overflow-y: hidden;">
                    <div id="chartWrapper" style="height: calc(100% - 15px); position: relative;">
                        <canvas id="averageSumChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="mainFooter" class="page-footer" style="cursor: pointer;">
        <div class="footer-content">
            <p>© 2024 로또 번호 생성기 (클릭하여 분석 그래프 표시/숨기기)</p>
        </div>
    </footer>

    <!-- 최신 추첨정보 모달 (당첨공 클릭 시 · 동행복권 파싱 결과) -->
    <div id="latestLottoModal" class="latest-lotto-modal" aria-hidden="true">
        <div class="latest-lotto-modal-inner">
            <div class="latest-lotto-modal-header">
                <h2>동행복권 최신 추첨정보</h2>
                <button type="button" id="latestLottoModalClose">닫기</button>
            </div>
            <div id="latestLottoModalContent" class="latest-lotto-modal-content"></div>
        </div>
    </div>



    <div id="aiChatModal" class="ai-chat-modal" aria-hidden="true" style="display:none;">
        <div class="ai-chat-header" id="aiChatHeader">
            <span>🤖 AI 로또 분석가</span>
            <button id="aiChatClose">X</button>
        </div>
        <div class="ai-chat-body" id="aiChatBody">
            <div class="ai-message system">
                안녕하세요! 데이터를 기반으로 로또 번호를 분석해 드립니다.<br>
                궁금한 점을 물어보세요. (예: "이번 주 추천 번호는?", "최근 홀짝 비율은?")
            </div>
        </div>
        <div class="ai-chat-input-area">
            <input type="text" id="aiChatInput" placeholder="질문을 입력하세요..." />
            <button id="aiChatSend">전송</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- 유틸리티 모듈 (app.js 이전에 로드) -->
    <script src="modules/constants.js"></script>
    <script src="modules/utils/dom.js"></script>
    <script src="modules/utils/cache.js"></script>
    <script src="modules/utils/errorHandler.js"></script>
    <script src="modules/utils/uiHelper.js"></script>
    <script src="modules/state.js"></script>
    <script src="modules/statistics.js"></script>
    <script src="modules/generator.js"></script>
    <script src="modules/dataLoader.js"></script>
    <script src="modules/filters.js"></script>

    <!-- 메인 애플리케이션 -->
    <script src="app.js?v=2.5"></script>

</body>

</html>
